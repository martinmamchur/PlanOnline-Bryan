<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plan Personalizado - Bryan Araujo</title>
<style>
:root{
  --bg:#121212; --surface:#1b1b1b; --surface2:#1f1f1f; --surface3:#242424;
  --border:#333; --border-soft:#2a2a2a;
  --accent:#ff4d29; --accent-dim:#5c2417;
  --lime:#c8ff3d; --lime-dim:#2c3713;
  --blue:#4da6ff; --blue-dim:#1a3050;
  --text:#f2f0ea; --dim:#a8a6a0; --faint:#76746e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100%;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input,textarea{font-family:inherit;}
input::placeholder,textarea::placeholder{color:var(--faint);}
.mono{font-family:'Courier New',monospace;letter-spacing:.04em;}
.scroll::-webkit-scrollbar{height:5px;width:5px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* HEADER */
#header{padding:16px 18px;border-bottom:1px solid var(--border);}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
#student-title{font-size:18px;font-weight:800;letter-spacing:.01em;text-transform:uppercase;}
#student-title span{color:var(--accent);}
#header-sub{font-size:11px;color:var(--faint);letter-spacing:.08em;margin-top:4px;}
#header-btns{display:flex;gap:6px;flex-wrap:wrap;}
.hbtn{font-family:'Courier New',monospace;font-size:11px;padding:7px 11px;border-radius:6px;letter-spacing:.06em;white-space:nowrap;cursor:pointer;}
.hbtn-lime{border:1px solid var(--lime);color:var(--lime);background:transparent;}
.hbtn-dim{border:1px solid var(--border);color:var(--dim);background:transparent;}
#import-msg{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;display:none;}
#import-msg.ok{background:rgba(200,255,61,.08);border:1px solid var(--lime);color:var(--lime);display:block;}
#import-msg.err{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);display:block;}

/* PROGRESS */
#progress-wrap{margin-bottom:14px;}
#progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
#progress-label{font-size:11px;color:var(--faint);letter-spacing:.1em;}
#progress-count{font-size:13px;font-weight:700;}
#progress-segs{display:flex;gap:3px;}
.pseg{flex:1;height:4px;border-radius:2px;background:var(--surface3);}
.pseg.done{background:var(--accent);}

/* MAIN TABS */
#main-tabs{display:flex;gap:8px;}
.tab-btn{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--dim);transition:all .15s;}
.tab-btn.active{border-color:var(--text);background:var(--text);color:#121212;}

/* CONTENT */
#content{padding:18px 18px 40px;}

/* WEEK SELECTOR */
#week-selector{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
.week-btn{min-width:40px;padding:8px 0;border-radius:6px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--dim);}
.week-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}

/* BLOCK CARD */
#block-card{background:var(--surface);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:16px;}
#block-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
#block-focus{font-size:13.5px;color:var(--text);}

/* DAY TABS */
#day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
.day-btn{padding:8px 14px;border-radius:7px;white-space:nowrap;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--dim);}
.day-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;}
.day-btn.active .day-dot{background:#fff;}

/* SESSION */
.session-badge{display:flex;justify-content:flex-end;margin-bottom:8px;}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.badge-fuerza{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);}
.badge-cardio{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue);}
.badge-mixto{background:var(--lime-dim);color:var(--lime);border:1px solid var(--lime);}
.session-title{font-size:22px;font-weight:800;line-height:1.1;text-transform:uppercase;margin-bottom:14px;}
.coach-note{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:13px;line-height:1.6;}
.coach-note strong{color:var(--lime);}

/* PHASE */
.phase-label{font-size:11px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px 15px;margin-bottom:8px;}
.ex-name{font-weight:700;font-size:15px;color:var(--text);margin-bottom:4px;}
.ex-detail{font-size:12.5px;color:var(--dim);margin-bottom:6px;}
.ex-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.pill{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.04em;border:1px solid var(--border);color:var(--dim);}
.pill-accent{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.pill-lime{border-color:var(--lime);color:var(--lime);background:var(--lime-dim);}

/* VIDEO */
.video-wrap{margin-bottom:8px;}
.video-row{display:flex;align-items:center;gap:6px;}
.video-input{flex:1;min-width:0;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);}
.video-saved{font-size:11px;color:var(--lime);}

/* LOG TABLE */
.log-section{margin-top:10px;}
.log-table{width:100%;border-collapse:collapse;min-width:260px;}
.log-th{padding:4px 6px;font-size:11px;color:var(--faint);text-align:left;font-weight:600;}
.log-tr{border-top:1px solid var(--border-soft);}
.log-td{padding:5px 6px;}
.log-num{font-size:13px;color:var(--dim);}
.log-input{width:58px;padding:5px 6px;font-size:13px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text);}
.log-input.wide{width:68px;}
.log-comment{width:100%;margin-top:7px;font-size:12px;padding:8px;min-height:40px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);resize:vertical;}

/* DONE BTN */
.done-btn{font-size:12px;padding:8px 14px;border-radius:6px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}
.done-btn.undone{border:1px solid var(--lime);background:transparent;color:var(--lime);}
.done-btn.done{border:1px solid var(--lime);background:var(--lime);color:#121212;}
.session-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px;}

/* PROG NOTE */
.prog-note{margin-top:20px;padding:12px 14px;background:var(--surface);border:1px dashed var(--border);border-radius:9px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px;}
.stat-card.full{grid-column:1/-1;}
.stat-num{font-size:30px;font-weight:800;line-height:1;}
.stat-lbl{font-size:12px;color:var(--dim);margin-top:4px;}
.block-bar-wrap{height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:7px;}
.block-bar-fill{height:100%;background:var(--accent);border-radius:3px;}

/* GUIDE */
.guide-hero{background:var(--lime);color:#121212;border-radius:10px;padding:18px;margin-bottom:16px;}
.guide-hero h2{font-size:17px;font-weight:800;margin-bottom:5px;}
.guide-hero p{font-size:13px;line-height:1.6;opacity:.85;}
.accordion{margin-bottom:8px;border:1px solid var(--border);border-radius:9px;background:var(--surface);overflow:hidden;}
.acc-header{width:100%;text-align:left;padding:13px 15px;background:transparent;border:none;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;}
.acc-toggle{color:var(--accent);font-size:17px;}
.acc-body{padding:0 15px 14px;font-size:13px;line-height:1.7;color:var(--dim);display:none;}
.acc-body.open{display:block;}
.acc-body ul{padding-left:16px;margin-top:4px;}
.acc-body li{margin-bottom:3px;}
.acc-body strong{color:var(--text);}
.config-lbl{font-size:12px;color:var(--dim);margin-bottom:5px;display:block;}
.config-input{padding:7px 9px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);}

/* IFRAME 16:9 */
.iframe-wrap{margin-top:7px;border-radius:7px;overflow:hidden;background:#000;display:none;position:relative;padding-top:56.25%;}
.iframe-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
</style>
</head>

<div id="header">
  <div id="header-top">
    <div>
      <div id="student-title">PLAN PERSONALIZADO — <span>BRYAN ARAUJO</span></div>

</div>

<div id="content"></div>

async function ghGetVideos() {

  } catch(e) { return false; }

/* ============================================================ HELPERS */
function exKey(s,d,f,e){ return 's'+s+'_d'+d+'_f'+f+'_e'+e; }
function doneKey(s,d){ return 's'+s+'_d'+d+'__done'; }

var FASE_A_RE = /Fase A/i;
var FASE_B_RE = /Fase B/i;
var FASE_D_RE = /Fase D/i;
var CARDIO_RE = /\bcarrera\b|running|assault bike|remo continuo|carrera continua|skierg|ski erg|trote|caminata|bici|cardio suave|skipping|strides/i;
var MOBIL_RE  = /movilidad|estiramiento|foam roller|activaci[oó]n|dead bug|bird dog|puente de gl[uú]teo|clamshell|wall slide|rotacion|cat-cow|pallof|equilibrio|propiocepci[oó]n|excentrico|eversión|elevaci[oó]n de gemelo/i;

function isCardioOrMobility(ej, faseNombre) {
  if (FASE_B_RE.test(faseNombre)) return false;
  if (FASE_A_RE.test(faseNombre) || FASE_D_RE.test(faseNombre)) return true;
  var n = (ej.nombre||'') + ' ' + (ej.detalle||'');
  if (CARDIO_RE.test(n) || MOBIL_RE.test(n)) return true;
  var s = (ej.series||'').trim();
  if (s && !s.match(/^(\d+)\s*(series|rondas)/i) && s.match(/^\d+\s*(min|seg|km| m\b)/i)) return true;
  return false;
}

function getTipoSesion(sesion) {
  var titulo = (sesion.titulo||'').toLowerCase();
  if (/fuerza|hipertrofia|potencia|full body/.test(titulo)) return 'fuerza';
  if (/carrera|cardio|z2|aerob|intervalo|regenerat/.test(titulo)) return 'cardio';
  return 'mixto';
}

/* ============================================================ VIDEO EMBED */
function getEmbedUrl(raw) {
  if (!raw) return null;
  var url = raw.trim();
  var vm = url.match(/vimeo\.com\/(?:video\/)?([0-9]+)/);
  if (vm) return 'https://player.vimeo.com/video/'+vm[1]+'?title=0&byline=0&portrait=0';
  var yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if (yt) return 'https://www.youtube.com/embed/'+yt[1]+'?rel=0';
  return null;
}
function isVertical(raw) {
  return raw && (raw.includes('/shorts/') || raw.includes('shorts'));
}
function makeIframeBlock(vidKey) {
  var wrap = document.createElement('div');
  wrap.className = 'video-wrap';
  var row = document.createElement('div');
  row.className = 'video-row';
  var inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'video-input';
  inp.placeholder = 'Pegar link de YouTube o Vimeo...';
  inp.value = state.videos[vidKey] || '';
  var saved = document.createElement('span');
  saved.className = 'video-saved'; saved.style.display='none'; saved.textContent='✓';
  var iWrap = document.createElement('div');
  iWrap.style.cssText='margin-top:7px;border-radius:7px;overflow:hidden;background:#000;display:none;position:relative;padding-top:56.25%;max-width:100%;';
  var iframe = document.createElement('iframe');
  iframe.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
  iframe.setAttribute('allowfullscreen','');
  iframe.setAttribute('allow','autoplay;fullscreen;picture-in-picture');
  iWrap.appendChild(iframe);
  function update() {
    var raw = inp.value;
    var eu = getEmbedUrl(raw);
    if (eu) {
      iframe.src = eu; iWrap.style.display='block';
      if (isVertical(raw)) {
        iWrap.style.paddingTop='0'; iWrap.style.height='460px'; iWrap.style.maxWidth='260px'; iWrap.style.margin='7px auto 0 auto';
        iframe.style.position='relative'; iframe.style.height='460px';
      } else {
        iWrap.style.paddingTop='56.25%'; iWrap.style.height=''; iWrap.style.maxWidth='100%'; iWrap.style.margin='7px 0 0 0';
        iframe.style.position='absolute'; iframe.style.height='100%';
      }
    } else { iframe.src=''; iWrap.style.display='none'; }
  }
  inp.addEventListener('input', function() {
    saveVideo(vidKey, inp.value);
    saved.style.display='inline'; setTimeout(function(){saved.style.display='none';},1200);
    update();
  });
  update();
  row.appendChild(inp); row.appendChild(saved);
  wrap.appendChild(row); wrap.appendChild(iWrap);
  return wrap;
}

/* ============================================================ RENDER HELPERS */
function el(tag, attrs, text) {
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k==='className') e.className=attrs[k];
    else if (k==='style') e.style.cssText=attrs[k];
    else e.setAttribute(k,attrs[k]);
  }
  if (text!=null) e.textContent=text;
  return e;
}
function pill(text, type) {
  var cls = 'pill' + (type?' pill-'+type:'');
  return el('span',{className:cls},text);
}

function renderExCard(semIdx, diaIdx, faseIdx, ejIdx, ejercicio, faseNombre) {
  var vk = exKey(semIdx,diaIdx,faseIdx,ejIdx);
  var lk = 'log_'+vk;
  var cardioMode = isCardioOrMobility(ejercicio, faseNombre);
  var entry = state.logData[lk] || { sets:[], comment:'' };
  var numSets = 1;
  if (!cardioMode) {
    var sm = (ejercicio.series||'').match(/^(\d+)/);
    numSets = sm ? Math.min(parseInt(sm[1]),8) : 3;
  }
  var setsArr = entry.sets.length===numSets ? entry.sets : Array.from({length:numSets},function(_,i){return entry.sets[i]||{kg:'',reps:''};});

  var card = el('div',{className:'ex-card'});
  // Nombre editable
  var nameKey = lk+'__name';
  var savedName = (state.logData[nameKey] && state.logData[nameKey].v) || ejercicio.nombre;
  var nameDiv = el('div',{className:'ex-name'});
  var nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = savedName;
  nameInput.style.cssText = 'background:transparent;border:none;border-bottom:1px dashed var(--faint);color:var(--text);font-weight:700;font-size:15px;width:100%;outline:none;padding:2px 0;min-width:0;';
  nameInput.addEventListener('input', function() {
    state.logData[nameKey] = { v: nameInput.value }; save();
  });
  nameDiv.appendChild(nameInput);
  card.appendChild(nameDiv);
  if (ejercicio.detalle) card.appendChild(el('div',{className:'ex-detail'},ejercicio.detalle));

  var meta = el('div',{className:'ex-meta'});
  if (ejercicio.series) meta.appendChild(pill(ejercicio.series));
  if (ejercicio.intensidad) meta.appendChild(pill(ejercicio.intensidad,'accent'));
  if (ejercicio.descanso && ejercicio.descanso!=='-') meta.appendChild(pill('↩ '+ejercicio.descanso));
  card.appendChild(meta);

  // Video
  card.appendChild(makeIframeBlock(ejercicio.nombre)); // clave = nombre, coincide con videos.json

  if (!cardioMode) {
    // Tabla de registro
    var logSec = el('div',{className:'log-section'});
    logSec.appendChild(el('div',{className:'phase-label'},'Tu registro'));
    var tableWrap = el('div',{className:'scroll',style:'overflow-x:auto'});
    var table = el('table',{className:'log-table'});
    var thead = el('tr');
    ['Serie','Kg','Reps logradas'].forEach(function(h){ thead.appendChild(el('th',{className:'log-th'},h)); });
    table.appendChild(thead);
    setsArr.forEach(function(s,i){
      var tr = el('tr',{className:'log-tr'});
      var td1=el('td',{className:'log-td'}); td1.appendChild(el('span',{className:'log-num'},'#'+(i+1))); tr.appendChild(td1);
      var kgInp = el('input',{type:'text',inputmode:'decimal',placeholder:'—',className:'log-input'});
      kgInp.value=s.kg||'';
      var repsInp = el('input',{type:'text',inputmode:'numeric',placeholder:'—',className:'log-input wide'});
      repsInp.value=s.reps||'';
      function makeUpdater(ki,ri,idx){ return function(){
        var e2=state.logData[lk]||{sets:[].concat(setsArr),comment:''};
        if(!e2.sets[idx]) e2.sets[idx]={};
        e2.sets[idx].kg=ki.value; e2.sets[idx].reps=ri.value;
        state.logData[lk]=e2; save();
      };}
      var upd=makeUpdater(kgInp,repsInp,i);
      kgInp.addEventListener('input',upd); repsInp.addEventListener('input',upd);
      var td2=el('td',{className:'log-td'}); td2.appendChild(kgInp); tr.appendChild(td2);
      var td3=el('td',{className:'log-td'}); td3.appendChild(repsInp); tr.appendChild(td3);
      table.appendChild(tr);
    });
    tableWrap.appendChild(table);
    logSec.appendChild(tableWrap);

    var comment=el('textarea',{className:'log-comment',placeholder:'Comentarios (sensación, energía, técnica...)'});
    comment.value=entry.comment||'';
    comment.addEventListener('input',function(){
      var e2=state.logData[lk]||{sets:[].concat(setsArr)};
      e2.comment=comment.value; state.logData[lk]=e2; save();
    });
    logSec.appendChild(comment);
    card.appendChild(logSec);
  } else {
    // Solo comentario para ejercicios cardio/movilidad
    var comment2=el('textarea',{className:'log-comment',placeholder:'Comentarios (sensación, RPE real, tiempo logrado...)'});
    comment2.value=entry.comment||'';
    comment2.addEventListener('input',function(){
      var e2=state.logData[lk]||{};
      e2.comment=comment2.value; state.logData[lk]=e2; save();
    });
    card.appendChild(comment2);
  }

  return card;
}

/* ============================================================ RENDER SESSION */
function renderSession(semIdx, diaIdx) {
  var sem = PROGRAMA[semIdx];
  var sesion = sem.sesiones[diaIdx];
  var tipo = getTipoSesion(sesion);
  var dk = doneKey(semIdx, diaIdx);
  var isDone = !!state.sessionDone[dk];
  var frag = document.createDocumentFragment();

  // Badge
  var badgeRow = el('div',{className:'session-badge'});
  var b = el('span',{className:'badge badge-'+tipo}, tipo.charAt(0).toUpperCase()+tipo.slice(1));
  badgeRow.appendChild(b); frag.appendChild(badgeRow);

  // Header
  var hdr = el('div',{className:'session-header'});
  hdr.appendChild(el('div',{className:'session-title'},sesion.titulo||sesion.dia));
  var doneBtn = el('button',{className:'done-btn '+(isDone?'done':'undone')});
  doneBtn.textContent = isDone ? '✓ Completada' : 'Marcar completada';
  doneBtn.addEventListener('click',function(){
    state.sessionDone[dk]=!state.sessionDone[dk]; save(); renderPlan(); renderHeader();
  });
  hdr.appendChild(doneBtn); frag.appendChild(hdr);

  // Coach note
  if (sesion.nota_coach) {
    var note = el('div',{className:'coach-note'});
    var strong = el('strong',null,'Nota del coach: '); note.appendChild(strong);
    note.appendChild(document.createTextNode(sesion.nota_coach));
    frag.appendChild(note);
  }

  // Fases
  sesion.fases.forEach(function(fase, fi) {
    var isA = FASE_A_RE.test(fase.fase);
    var faseDiv = el('div',{style:'margin-bottom:18px'});
    faseDiv.appendChild(el('div',{className:'phase-label'},fase.fase));

    if (isA) {
      // Fase A — 4 slots de movilidad + 3 de core (sin ejercicios fijos)
      var wuSlots = [
        { key:'mov1', label:'Movilidad 1' },
        { key:'mov2', label:'Movilidad 2' },
        { key:'mov3', label:'Movilidad 3' },
        { key:'mov4', label:'Movilidad 4' },
        { key:'core1', label:'Core 1' },
        { key:'core2', label:'Core 2' },
        { key:'core3', label:'Core 3' },
      ];
      wuSlots.forEach(function(slot) {
        var wuKey = 's'+semIdx+'_d'+diaIdx+'_WU_'+slot.key;
        var vidKey = 'calentamiento__'+slot.key; // clave fija en videos.json
        var lk = 'log_'+wuKey;
        var entry = state.logData[lk] || {comment:''};
        var card = el('div',{className:'ex-card'});
        card.style.marginBottom='8px';
        // Label sin nombre fijo
        var labelEl = document.createElement('div');
        labelEl.style.cssText = 'font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px;';
        labelEl.textContent = slot.label;
        card.appendChild(labelEl);
        card.appendChild(makeIframeBlock(vidKey));
        var comment = el('textarea',{className:'log-comment',placeholder:'Comentarios...'});
        comment.value = entry.comment||'';
        comment.addEventListener('input',function(){
          state.logData[lk]={comment:comment.value}; save();
        });
        card.appendChild(comment);
        faseDiv.appendChild(card);
      });
    } else {
      fase.ejercicios.forEach(function(ej, ei) {
        faseDiv.appendChild(renderExCard(semIdx, diaIdx, fi, ei, ej, fase.fase));
      });
    }
    frag.appendChild(faseDiv);
  });

  // Progression note
  if (sem.nota_semana) {
    var pn = el('div',{className:'prog-note'});
    pn.appendChild(el('div',{className:'phase-label'},'Progresión semanal'));
    pn.appendChild(el('p',{style:'font-size:13px;line-height:1.6;color:var(--dim)'},sem.nota_semana));
    frag.appendChild(pn);
  }

  return frag;
}

/* ============================================================ RENDER PLAN TAB */
function renderPlan() {
  var c = document.getElementById('content');
  c.innerHTML = '';
  var sem = PROGRAMA[state.week];

  // Week selector
  c.appendChild(el('div',{className:'phase-label',style:'margin-bottom:8px'},'Semanas del plan'));
  var wr = el('div',{className:'scroll',id:'week-selector'});
  for (var i=0;i<TOTAL_SEMANAS;i++) {
    (function(idx){
      var btn=el('button',{className:'week-btn mono'+(idx===state.week?' active':'')});
      btn.textContent='S'+(idx+1);
      btn.addEventListener('click',function(){ state.week=idx; state.day=0; renderPlan(); renderHeader(); });
      wr.appendChild(btn);
    })(i);
  }
  c.appendChild(wr);

  // Block card
  var bc=el('div',{id:'block-card'});
  bc.appendChild(el('div',{id:'block-label'},sem.bloque.toUpperCase()));
  bc.appendChild(el('div',{id:'block-focus'},sem.fase_bloque||''));
  c.appendChild(bc);

  // Day tabs
  var dt=el('div',{className:'scroll',id:'day-tabs'});
  sem.sesiones.forEach(function(s,i){
    var btn=el('button',{className:'day-btn'+(i===state.day?' active':'')});
    var dot=el('span',{className:'day-dot'}); btn.appendChild(dot);
    btn.appendChild(document.createTextNode(s.dia));
    (function(idx){ btn.addEventListener('click',function(){ state.day=idx; renderPlan(); }); })(i);
    dt.appendChild(btn);
  });
  c.appendChild(dt);

  // Session
  c.appendChild(renderSession(state.week, state.day));
}

/* ============================================================ RENDER HEADER */
function renderHeader() {
  // Date range
  var dr = document.getElementById('date-range');
  if (state.planStart) {
    var s=new Date(state.planStart+'T00:00:00');
    if (!isNaN(s.getTime())) {
      var e=new Date(s); e.setDate(e.getDate()+TOTAL_SEMANAS*7);
      var fmt=function(d){return d.toLocaleDateString('es-ES',{month:'short',year:'numeric'}).toUpperCase().replace('.','');};
      dr.textContent=fmt(s)+' → '+fmt(e);
    }
  }

  // Progress
  var cw=0;
  for(var w=0;w<TOTAL_SEMANAS;w++){
    var nd=PROGRAMA[w].sesiones.length; var all=true;
    for(var d=0;d<nd;d++){ if(!state.sessionDone[doneKey(w,d)]){all=false;break;} }
    if(all) cw++; else break;
  }
  document.getElementById('completed-count').textContent=cw;

  var segs=document.getElementById('progress-segs');
  segs.innerHTML='';
  for(var i=0;i<TOTAL_SEMANAS;i++){
    var seg=el('div',{className:'pseg'+(i<cw?' done':'')});
    segs.appendChild(seg);
  }
}

/* ============================================================ RENDER STATS */
function renderStats() {
  var c=document.getElementById('content'); c.innerHTML='';
  var total=PROGRAMA.reduce(function(a,s){return a+s.sesiones.length;},0);
  var done=Object.values(state.sessionDone).filter(Boolean).length;
  var pct=total?Math.round((done/total)*100):0;
  var sets=Object.values(state.logData).reduce(function(a,e){
    if(!e||!e.sets) return a;
    return a+e.sets.filter(function(s){return s&&(s.kg||s.reps);}).length;
  },0);

  c.appendChild(el('div',{className:'phase-label'},'Resumen general'));
  var grid=el('div',{className:'stats-grid'});
  var s1=el('div',{className:'stat-card'});
  s1.appendChild(el('div',{className:'stat-num',style:'color:var(--accent)'},done));
  s1.appendChild(el('div',{className:'stat-lbl'},'de '+total+' sesiones completadas'));
  grid.appendChild(s1);
  var s2=el('div',{className:'stat-card'});
  s2.appendChild(el('div',{className:'stat-num',style:'color:var(--lime)'},pct+'%'));
  s2.appendChild(el('div',{className:'stat-lbl'},'del plan total avanzado'));
  grid.appendChild(s2);
  var s3=el('div',{className:'stat-card full'});
  s3.appendChild(el('div',{className:'stat-num',style:'color:var(--text)'},sets));
  s3.appendChild(el('div',{className:'stat-lbl'},'series registradas con datos'));
  grid.appendChild(s3);
  c.appendChild(grid);

  c.appendChild(el('div',{className:'phase-label'},'Avance por bloque'));
  var bloques=[...new Set(PROGRAMA.map(function(s){return s.bloque;}))];
  bloques.forEach(function(bloque){
    var semsBloque=PROGRAMA.filter(function(s){return s.bloque===bloque;});
    var totalB=semsBloque.reduce(function(a,s){return a+s.sesiones.length;},0);
    var doneB=semsBloque.reduce(function(a,sem,si){
      var semIdx=PROGRAMA.indexOf(sem);
      var nd=sem.sesiones.length; var cnt=0;
      for(var d=0;d<nd;d++){if(state.sessionDone[doneKey(semIdx,d)])cnt++;}
      return a+cnt;
    },0);
    var bpct=Math.round((doneB/totalB)*100);
    var card=el('div',{className:'stat-card',style:'margin-bottom:8px'});
    var row=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:7px'});
    row.appendChild(el('div',{style:'font-weight:700;font-size:13px'},bloque));
    row.appendChild(el('div',{className:'mono',style:'font-size:11px;color:var(--dim)'},doneB+'/'+totalB));
    card.appendChild(row);
    var bw=el('div',{className:'block-bar-wrap'});
    var bf=el('div',{className:'block-bar-fill',style:'width:'+bpct+'%'});
    bw.appendChild(bf); card.appendChild(bw);
    c.appendChild(card);
  });
}

/* ============================================================ RENDER GUIDE */
var GUIDE_SECTIONS = [
  {id:'config', title:'⚙️ Configuración del plan', body: function(div){
    div.appendChild(el('label',{className:'config-lbl'},'Fecha de inicio (para calcular el rango del plan)'));
    var inp=el('input',{type:'date',className:'config-input'});
    inp.value=state.planStart||'';
    inp.addEventListener('change',function(){state.planStart=inp.value;save();renderHeader();});
    div.appendChild(inp);
  }},
  {id:'exportar', title:'📤 Cómo enviar tu progreso', body: function(div){
    div.innerHTML='<ul><li>Tocá <strong>"⬇ Exportar progreso"</strong> en el encabezado.</li><li>Se descarga un archivo <code>.json</code> con todo tu registro.</li><li>Enviáselo a tu entrenador por WhatsApp o mail.</li><li>Hacé esto cada 1-2 semanas para que pueda hacer seguimiento.</li></ul>';
  }},
  {id:'uso', title:'📋 Cómo usar este plan', body: function(div){
    div.innerHTML='<ul><li>Elegí la semana en curso con los botones S1-S17.</li><li>Navegá entre los días de entrenamiento.</li><li>Registrá kg y repeticiones en cada serie — se guarda automáticamente.</li><li>Pegá links de video de YouTube o Vimeo en cada ejercicio.</li><li>Revisá "Stats" para ver tu avance por bloque.</li></ul>';
  }},
];

function renderGuide() {
  var c=document.getElementById('content'); c.innerHTML='';
  var hero=el('div',{className:'guide-hero'});
  hero.appendChild(el('h2',null,'Plan Hyrox Open Individual'));
  hero.appendChild(el('p',null,'17 semanas de preparación periodizada. Seguí el plan, registrá tus datos y enviáselos a tu entrenador semanalmente para un seguimiento real.'));
  c.appendChild(hero);
  GUIDE_SECTIONS.forEach(function(sec){
    var acc=el('div',{className:'accordion'});
    var hdr=el('button',{className:'acc-header'});

    var tgl=el('span',{className:'acc-toggle'},'+'); hdr.appendChild(tgl);
    var body=el('div',{className:'acc-body'});

      var open=body.classList.toggle('open');
      tgl.textContent=open?'−':'+';

/* ============================================================ TAB SWITCHING */
function switchTab(tab) {
  state.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===tab); });
  if(tab==='plan') renderPlan();
  else if(tab==='stats') renderStats();
  else renderGuide();
}

/* ============================================================ EXPORT / IMPORT */
function exportProgress() {
  var payload={app:'plan-bryan-araujo',exportedAt:new Date().toISOString(),
    planStart:state.planStart,logData:state.logData,videos:state.videos,sessionDone:state.sessionDone};
  try {
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='progreso-bryan-araujo-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},2000);
  } catch(e){ alert('No se pudo generar el archivo. Abrí el plan en Safari e intentá de nuevo.'); }
}
function triggerImport(){ showMsg('',''); document.getElementById('import-file').click(); }
function handleImport(e) {
  var file=e.target.files&&e.target.files[0]; e.target.value='';
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try {
      var p=JSON.parse(ev.target.result);
      if(!p||!('logData' in p)||!('sessionDone' in p)){showMsg('Formato inesperado.','err');return;}
      if(!confirm('Vas a reemplazar los datos actuales con los del archivo exportado. ¿Continuar?')) return;
      state.logData=p.logData||{}; state.videos=p.videos||{}; state.sessionDone=p.sessionDone||{};
      if(p.planStart) state.planStart=p.planStart;
      save(); renderHeader(); switchTab(state.tab);
      showMsg('Progreso importado correctamente.','ok');
    } catch(err){ showMsg('No se pudo leer el archivo.','err'); }
  };
  reader.readAsText(file);
}
function showMsg(text,type){
  var el2=document.getElementById('import-msg');
  el2.textContent=text; el2.className=text?type:'';
}
function resetAll(){
  if(!confirm('Esto borrará todo el registro guardado. ¿Seguro?')) return;
  state.logData={}; state.videos={}; state.sessionDone={}; state.planStart='';
  save(); renderHeader(); switchTab('plan');
}

/* ============================================================ BOOT */
async function _boot() {
  try {
    var ghVideos = await ghGetVideos();
    if (ghVideos && typeof ghVideos === 'object') {
      state.videos = ghVideos;
      save();
    }
  } catch(e) { /* usa cache local */ }
  renderHeader();
  renderPlan();
}
if (document.readyState==='loading') {
  document.addEventListener('DOMContentLoaded',_boot);
} else {
  _boot();
}
</script>
