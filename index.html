<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Plan Personalizado - Bryan Araujo</title>
<style>
  :root{
    --bg: #121212;
    --bg-elev: #1B1B1B;
    --bg-card: #1F1F1F;
    --bg-card-2: #242424;
    --line: #333333;
    --line-soft: #2A2A2A;
    --text: #F2F0EA;
    --text-dim: #A8A6A0;
    --text-faint: #76746E;
    --orange: #FF4D29;
    --orange-dim: #5C2417;
    --lime: #C8FF3D;
    --lime-dim: #2C3713;
    --blue: #4DA6FF;
    --font-display: "Arial Black", "Helvetica Neue", Arial, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Roboto Mono", "Courier New", monospace;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{ margin:0; padding:0; background: var(--bg); color: var(--text); }
  body{
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  #root{ min-height: 100vh; }
  h1,h2,h3,h4{ margin:0; font-family: var(--font-display); letter-spacing: -0.02em; font-weight: 900; text-transform: uppercase; }
  button{ font-family: inherit; cursor: pointer; }
  input, textarea{ font-family: inherit; }
  ::-webkit-scrollbar{ display:none; }
  *{ scrollbar-width: none; }

  .app{ max-width: 720px; margin: 0 auto; padding-bottom: 60px; }

  /* HEADER */
  .topbar{
    position: sticky; top:0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: calc(14px + var(--safe-top)) 16px 0 16px;
  }
  .brand-row{ display:flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .brand{ display:flex; align-items:baseline; gap:8px; min-width: 0; }
  .brand h1{ font-size: 15px; line-height: 1.25; color: var(--text); word-break: break-word; }
  .brand .accent{ color: var(--orange); }
  .brand-sub{ font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .reset-btn{
    flex: 0 0 auto;
    background:none; border: 1px solid var(--line); color: var(--text-faint);
    border-radius: 6px; padding: 5px 9px; font-size: 11px; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .reset-btn:active{ background: var(--bg-card); }

  /* TRACK PROGRESS BAR (signature element) */
  .track-wrap{ padding: 2px 0 14px 0; }
  .track-label-row{ display:flex; justify-content: space-between; align-items:baseline; margin-bottom: 6px; }
  .track-label{ font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .track-label b{ color: var(--lime); font-weight: 700; }
  .track-lanes{ display:flex; gap: 3px; height: 6px; }
  .lane{ flex:1; border-radius: 2px; background: var(--line-soft); position: relative; overflow:hidden; }
  .lane.done{ background: var(--lime); }
  .lane.current{ background: var(--orange); }

  /* WEEK SELECTOR PILLS */
  .week-scroller{
    display:flex; gap: 6px; overflow-x: auto; padding: 0 0 12px 0;
    -webkit-overflow-scrolling: touch;
  }
  .week-pill{
    flex: 0 0 auto;
    min-width: 40px;
    padding: 7px 0;
    text-align:center;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 700;
  }
  .week-pill.active{ background: var(--orange); border-color: var(--orange); color: #1A0A05; }
  .week-pill.complete:not(.active){ border-color: var(--lime); color: var(--lime); }

  /* BLOCK BANNER */
  .block-banner{
    margin: 0 16px 14px 16px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: var(--bg-card);
    border-left: 3px solid var(--orange);
  }
  .block-banner .b-title{ font-size: 11px; font-family: var(--font-mono); color: var(--orange); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .block-banner .b-sub{ font-size: 13px; color: var(--text-dim); }

  /* DAY NAV */
  .day-nav{
    display:flex; gap: 6px; overflow-x:auto; padding: 0 16px 12px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .day-tab{
    flex: 0 0 auto;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .day-tab.active{ background: var(--bg-card-2); border-color: var(--text-dim); color: var(--text); }
  .day-tab .dot{ width:6px; height:6px; border-radius:50%; background: var(--line); }
  .day-tab .dot.done{ background: var(--lime); }
  .type-badge{
    font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.03em;
    padding: 1px 5px; border-radius: 4px;
  }
  .type-Fuerza{ background: var(--orange-dim); color: #FF8866; }
  .type-Carrera{ background: #163047; color: var(--blue); }
  .type-Hibrido, .type-Fuerza\/Hibrido{ background: var(--lime-dim); color: var(--lime); }
  .type-Regenerativo, .type-Carrera\/Regenerativo{ background: #2A2A2A; color: var(--text-dim); }
  .type-Descanso, .type-Pre-competencia{ background: #2A2A2A; color: var(--text-dim); }

  /* SESSION CONTENT */
  .session{ padding: 0 16px; }
  .session-head{ margin-bottom: 14px; }
  .session-head h2{ font-size: 21px; color: var(--text); margin-bottom: 4px; }
  .session-notes{
    font-size: 13px; color: var(--text-dim); line-height: 1.55;
    background: var(--bg-card); border-radius: var(--radius); padding: 10px 12px;
    border: 1px solid var(--line-soft);
    margin-bottom: 16px;
  }
  .session-notes b{ color: var(--lime); }

  .phase{ margin-bottom: 18px; }
  .phase-head{
    display:flex; align-items:center; gap:8px;
    margin-bottom: 8px;
  }
  .phase-bar{ width: 4px; height: 16px; border-radius: 2px; background: var(--orange); }
  .phase-head h3{ font-size: 13px; color: var(--text); letter-spacing: 0; text-transform: none; font-weight: 700; font-family: var(--font-body); }

  .ex-card{
    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 8px;
  }
  .ex-top{ display:flex; justify-content: space-between; align-items:flex-start; gap: 8px; margin-bottom: 6px; }
  .ex-name{ font-size: 14.5px; font-weight: 700; color: var(--text); }
  .ex-detail{ font-size: 12.5px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
  .video-btn{
    flex: 0 0 auto;
    background: var(--bg-elev); border: 1px solid var(--line); color: var(--text-dim);
    border-radius: 6px; width: 30px; height: 30px;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px;
  }
  .video-btn.has-link{ border-color: var(--blue); color: var(--blue); }
  .ex-meta-row{
    display:flex; gap: 14px; margin: 8px 0 10px 0;
    font-family: var(--font-mono); font-size: 11.5px;
  }
  .ex-meta-item{ color: var(--text-dim); }
  .ex-meta-item b{ color: var(--text); font-weight: 700; display:block; font-size: 12.5px; margin-top: 1px; }
  .ex-meta-label{ text-transform: uppercase; letter-spacing: 0.04em; font-size: 9.5px; color: var(--text-faint); }

  .track-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;
  }
  .track-field label{
    display:block; font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-faint); margin-bottom: 4px;
  }
  .track-field input, .track-field textarea{
    width: 100%; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); padding: 7px 8px; font-size: 13px;
  }
  .track-field input:focus, .track-field textarea:focus, .video-input:focus{
    outline: none; border-color: var(--orange);
  }
  .track-field.full{ grid-column: 1 / -1; }
  .track-field textarea{ resize: vertical; min-height: 34px; font-family: var(--font-body); }

  .video-row{ display:flex; gap: 6px; margin-top: 4px; }
  .video-input{
    flex:1; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 6px; color: var(--blue); padding: 6px 8px; font-size: 12px;
  }
  .video-go{
    background: none; border: 1px solid var(--line); color: var(--text-dim);
    border-radius: 6px; padding: 0 10px; font-size: 12px;
  }

  .ex-check{
    display:flex; align-items:center; gap: 8px; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid var(--line-soft);
  }
  .ex-check input[type=checkbox]{
    width: 18px; height: 18px; accent-color: var(--lime);
  }
  .ex-check span{ font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.03em; }

  .complete-day-btn{
    width: 100%; padding: 14px; margin-top: 8px; margin-bottom: 24px;
    border-radius: var(--radius); border: none;
    background: var(--orange); color: #1A0A05;
    font-family: var(--font-display); font-size: 14px; letter-spacing: 0.02em;
  }
  .complete-day-btn.done{ background: var(--lime); }
  .complete-day-btn:active{ opacity: 0.85; }

  /* BLOQUE / GUIA SECTIONS */
  .info-section{ padding: 0 16px; margin-bottom: 28px; }
  .info-card{
    background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px;
  }
  .info-card h3{ font-size: 13px; color: var(--lime); margin-bottom: 6px; font-family: var(--font-body); font-weight: 700; text-transform: none; }
  .info-card p{ font-size: 13px; color: var(--text-dim); line-height: 1.6; margin: 0 0 6px 0; }
  .info-card p:last-child{ margin-bottom: 0; }
  .info-card ul{ margin: 0; padding-left: 18px; }
  .info-card li{ font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 4px; }

  /* TOP NAV TABS (main sections) */
  .main-tabs{
    display:flex; gap: 4px; padding: 0 16px 12px 16px;
  }
  .main-tab{
    flex:1; text-align:center; padding: 9px 4px;
    border-radius: 8px; border: 1px solid var(--line);
    background: var(--bg-elev); color: var(--text-dim);
    font-size: 12px; font-weight: 700;
  }
  .main-tab.active{ background: var(--text); color: var(--bg); border-color: var(--text); }

  .section-title{
    font-size: 17px; color: var(--text); padding: 4px 16px 12px 16px;
  }

  .stat-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px; margin-bottom: 20px; }
  .stat-card{ background: var(--bg-card); border-radius: var(--radius); padding: 12px; }
  .stat-card .s-label{ font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: var(--text-faint); letter-spacing: 0.04em; }
  .stat-card .s-val{ font-size: 24px; font-weight: 700; color: var(--lime); margin-top: 2px; font-family: var(--font-display); }

  .footer-note{
    text-align:center; color: var(--text-faint); font-size: 11px; padding: 20px 24px;
    font-family: var(--font-mono);
  }

  @media (min-width: 600px){
    .track-grid{ grid-template-columns: 1fr 1fr 1fr; }
  }

  /* ── COMPROMISED RUNNING BLOCK ── */
  .cr-block{
    background: var(--bg-card); border: 1px solid var(--line-soft);
    border-radius: var(--radius); margin-bottom: 18px; overflow: hidden;
  }
  .cr-header{
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border-bottom: 1px solid var(--line-soft);
    gap: 10px;
  }
  .cr-header-left{ display: flex; align-items: center; gap: 10px; }
  .cr-letter{
    width: 26px; height: 26px; border-radius: 50%; flex: 0 0 auto;
    background: var(--orange-dim); color: var(--orange);
    font-family: var(--font-display); font-size: 12px;
    display: flex; align-items: center; justify-content: center; font-weight: 900;
  }
  .cr-title{ font-size: 14px; font-weight: 700; color: var(--text); }
  .cr-rounds-badge{
    background: var(--orange-dim); color: var(--orange);
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .cr-time{ font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  .cr-hint{
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 14px; border-bottom: 1px solid var(--line-soft);
    font-size: 12px; color: var(--orange); line-height: 1.45;
    background: #1C1008;
  }
  .cr-hint-icon{ flex: 0 0 auto; margin-top: 1px; }
  .cr-table{ width: 100%; border-collapse: collapse; }
  .cr-table-head tr th{
    font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-faint); padding: 8px 14px 6px 14px;
    text-align: left; border-bottom: 1px solid var(--line-soft);
  }
  .cr-table-head tr th:nth-child(2),
  .cr-table-head tr th:nth-child(3),
  .cr-table-head tr th:nth-child(4){ text-align: right; }
  .cr-row{ border-bottom: 1px solid var(--line-soft); }
  .cr-row:last-child{ border-bottom: none; }
  .cr-row td{ padding: 0; vertical-align: top; }
  .cr-row-main{ display: flex; align-items: stretch; }
  .cr-step-num{
    width: 32px; flex: 0 0 32px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 13px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    color: var(--text-faint);
  }
  .cr-step-body{ flex: 1; padding: 10px 14px 10px 0; }
  .cr-step-name{ font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .cr-step-detail{ font-size: 11.5px; color: var(--text-dim); line-height: 1.4; }
  .cr-step-meta{
    display: flex; gap: 16px; margin-top: 6px;
    font-family: var(--font-mono); font-size: 11px;
  }
  .cr-meta-qty{ color: var(--text); font-weight: 700; }
  .cr-meta-rpe{ color: var(--orange); font-weight: 700; }
  .cr-meta-z2{ color: var(--blue); font-weight: 700; }
  .cr-meta-pause{ color: var(--text-dim); }
  .cr-tracking{
    margin: 0 14px 10px 32px;
    background: var(--bg-elev); border-radius: 7px; padding: 8px 10px;
    border: 1px solid var(--line-soft);
  }
  .cr-track-row{ display: flex; gap: 8px; margin-bottom: 6px; }
  .cr-track-field{ flex: 1; }
  .cr-track-field label{
    display: block; font-family: var(--font-mono); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); margin-bottom: 3px;
  }
  .cr-track-field input, .cr-track-field textarea{
    width: 100%; background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 5px; color: var(--text); padding: 5px 7px; font-size: 12px;
    font-family: inherit;
  }
  .cr-track-field input:focus, .cr-track-field textarea:focus{ outline: none; border-color: var(--orange); }
  .cr-track-field textarea{ resize: vertical; min-height: 28px; }
  .cr-video-row{ display: flex; gap: 5px; margin-bottom: 6px; }
  .cr-video-input{
    flex: 1; background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 5px; color: var(--blue); padding: 5px 7px; font-size: 11px;
    font-family: inherit;
  }
  .cr-video-input:focus{ outline: none; border-color: var(--blue); }
  .cr-video-btn{
    background: none; border: 1px solid var(--line); color: var(--text-faint);
    border-radius: 5px; padding: 0 8px; font-size: 11px;
  }
  .cr-check{ display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .cr-check input{ accent-color: var(--lime); width: 15px; height: 15px; }
  .cr-check span{ font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.03em; }
  .cr-divider{
    height: 1px; background: var(--line-soft); margin: 0 14px;
  }

  /* ── EXERCISE CARD v2 (fases A, B, D) — tabla de series ── */
  .ex-card2{
    background: var(--bg-card); border: 1px solid var(--line-soft);
    border-radius: var(--radius); padding: 14px 14px 10px 14px;
    margin-bottom: 10px;
  }
  .ex2-header{
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px; margin-bottom: 4px;
  }
  .ex2-name{
    font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3;
  }
  .ex2-badges{
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap; flex-shrink: 0;
  }
  .badge-series, .badge-reps{
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; text-transform: uppercase;
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .badge-series{ background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--line); }
  .badge-reps{ background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--line); }
  .badge-int{ font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
  .badge-rpe{ background: var(--orange-dim); color: var(--orange); }
  .badge-rir{ background: var(--orange-dim); color: var(--orange); }
  .badge-z2{ background: #163047; color: var(--blue); }
  .badge-z3{ background: #163047; color: var(--blue); }
  .badge-z4{ background: #2A1008; color: #FF8866; }
  .ex2-detail{ font-size: 12.5px; color: var(--text-dim); line-height: 1.4; margin-bottom: 3px; }
  .ex2-descanso{ font-size: 12px; color: var(--text-faint); margin-bottom: 8px; }
  .ex2-video-row{
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  .ex2-video-input{
    flex: 1; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 7px; color: var(--blue); padding: 7px 10px; font-size: 12px;
    font-family: inherit;
  }
  .ex2-video-input:focus{ outline: none; border-color: var(--blue); }
  .ex2-video-input::placeholder{ color: var(--text-faint); }
  .ex2-video-go{
    background: none; border: 1px solid var(--blue); color: var(--blue);
    border-radius: 7px; padding: 0 12px; font-size: 13px;
  }
  .ex2-series-block{ margin-bottom: 8px; }
  .ex2-series-label{
    font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-faint); margin-bottom: 6px;
  }
  .ex2-series-table{ display: flex; flex-direction: column; gap: 0; }
  .ex2-series-thead{
    display: grid; grid-template-columns: 44px 1fr 1fr;
    padding: 0 0 4px 0; margin-bottom: 2px;
    border-bottom: 1px solid var(--line-soft);
  }
  .ex2-th-serie, .ex2-th-kg, .ex2-th-reps{
    font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-faint); padding: 0 4px;
  }
  .ex2-series-row{
    display: grid; grid-template-columns: 44px 1fr 1fr;
    align-items: center; gap: 0;
    border-bottom: 1px solid var(--line-soft); padding: 4px 0;
  }
  .ex2-series-row:last-child{ border-bottom: none; }
  .ex2-td-serie{
    font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
    font-weight: 700; padding: 0 4px;
  }
  .ex2-td-kg, .ex2-td-reps{ padding: 2px 4px; }
  .ex2-input{
    width: 100%; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 13px;
    font-family: inherit;
  }
  .ex2-input:focus{ outline: none; border-color: var(--orange); }
  .ex2-input::placeholder{ color: var(--line); }
  .ex2-comentario{ margin-top: 6px; }
  .ex2-textarea{
    width: 100%; background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 7px; color: var(--text); padding: 8px 10px;
    font-size: 13px; font-family: inherit; resize: vertical; min-height: 36px;
  }
  .ex2-textarea:focus{ outline: none; border-color: var(--orange); }
  .ex2-textarea::placeholder{ color: var(--text-faint); }
  .header-actions{

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const PROGRAMA = JSON.parse(document.getElementById('program-data').textContent);
const programa = PROGRAMA;
const STORAGE_KEY = "hyrox17_tracking_v1";

function loadTracking(){ try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{}; }catch(e){ return {}; } }
function saveTracking(data){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }catch(e){} }

function downloadJSON(filename,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exKey(s,d,f,e){ return `s${s}_d${d}_f${f}_e${e}`; }
function dayKey(s,d){ return `s${s}_d${d}_done`; }
function typeClass(t){ return "type-"+t.replace("/","\\/"); }

/* ── HELPERS ── */

/* Es CR real solo si tiene >=2 ejercicios Y al menos uno involucra carrera/cardio */
const CR_KEYWORDS = /carrera|running|remo|skierg|ski erg|sled|burpee|broad jump/i;
function isRealCR(fase){
  if(!/Fase C/i.test(fase.fase)) return false;
  if(fase.ejercicios.length < 2) return false;
  return fase.ejercicios.some(ej =>
    CR_KEYWORDS.test(ej.nombre) || CR_KEYWORDS.test(ej.detalle||"")
  );
}

/* Extrae numero de rondas SOLO de patrones tipo "4 series x ...", "3 rondas"
   Ignora distancias puras como "1000 m", "500 m", "1 km" */
function parseRondas(ejercicios){
  for(const ej of ejercicios){
    const s = (ej.series||"").trim();
    // "4 series x ..." o "3 rondas" -> valido
    const mSeries = s.match(/^(\d+)\s+series/i);
    if(mSeries) return mSeries[1]+" rondas";
    const mRondas = s.match(/^(\d+)\s+rondas/i);
    if(mRondas) return mRondas[1]+" rondas";
    // "4 x 400m" -> valido (primero un numero luego x)
    const mX = s.match(/^(\d+)\s*x\s/i);
    if(mX) return mX[1]+" rondas";
  }
  return null;
}

/* Colorear intensidad */
function intensityClass(str){
  if(!str) return "cr-meta-qty";
  if(/Z2/i.test(str)) return "cr-meta-z2";
  if(/Z3|Z4/i.test(str)) return "cr-meta-rpe";
  if(/RPE/i.test(str)) return "cr-meta-rpe";
  return "cr-meta-qty";
}

/* Nombre del bloque CR sin el prefijo "Fase C - " */
function crBlockTitle(faseNombre){
  return faseNombre.replace(/^Fase C\s*[-–]\s*/i,"").trim() || "Compromised Running";
}

/* Tiempo estimado */
function estimateCRTime(n){
  if(n<=2) return "8-12 min";
  if(n<=4) return "12-20 min";
  return "20-30 min";
}

/* Parsear numero de series de la cadena, ej "4 series x 8-10 reps" -> 4 */
function parseSeries(seriesStr){
  if(!seriesStr) return 1;
  const m = seriesStr.match(/^(\d+)\s*(series|rondas|x\s)/i);
  if(m) return Math.min(parseInt(m[1]), 8); // max 8 filas
  // si es solo tiempo o distancia, 1 fila
  return 1;
}

/* Parsear intensidad para mostrar badge */
function parseIntensityBadge(intensidad){
  if(!intensidad) return null;
  const rpe = intensidad.match(/RPE\s*([\d\-]+)/i);
  if(rpe) return { label: "RPE "+rpe[1], cls: "badge-rpe" };
  const rir = intensidad.match(/RIR\s*(\d+)/i);
  if(rir) return { label: "RIR "+rir[1], cls: "badge-rir" };
  const z = intensidad.match(/Z(\d)/i);
  if(z) return { label: "Z"+z[1], cls: "badge-z"+z[1] };
  return null;
}

/* ══════════════════════════════════════════════════
   EXERCISE CARD — fases A, B, D
   Tracking por serie: tabla #1/#2/#3 con kg+reps cada fila
   ══════════════════════════════════════════════════ */
function ExerciseCard({ semana, diaIdx, faseIdx, exIdx, ejercicio, tracking, onChange, readOnly }){
  const k = exKey(semana,diaIdx,faseIdx,exIdx);
  const data = tracking[k] || { series:[], comentario:"", video:"", done:false };
  const numSeries = parseSeries(ejercicio.series);
  const badge = parseIntensityBadge(ejercicio.intensidad);
  const hasVideo = data.video && data.video.trim().length>0;
  const [showVideo, setShowVideo] = useState(false);

  const upd = (patch) => { if(readOnly) return; onChange(k, {...data, ...patch}); };

  const updSerie = (idx, field, val) => {
    if(readOnly) return;
    const arr = [...(data.series||[])];
    while(arr.length <= idx) arr.push({kg:"", reps:""});
    arr[idx] = {...arr[idx], [field]: val};
    onChange(k, {...data, series: arr});
  };

  const getSerie = (idx) => (data.series && data.series[idx]) || {kg:"", reps:""};
  const hasAnyData = (data.series||[]).some(s=>s.kg||s.reps) || data.comentario || data.done;

  return (
    <div className="ex-card2">
      {/* Header: nombre + badges + video toggle */}
      <div className="ex2-header">
        <div className="ex2-name">{ejercicio.nombre}</div>
        <div className="ex2-badges">
          {ejercicio.series && (
            <span className="badge-series">{ejercicio.series.split(" x ")[0].replace(/series?/i,"").trim()} SERIES</span>
          )}
          {ejercicio.series && ejercicio.series.includes(" x ") && (
            <span className="badge-reps">{ejercicio.series.split(" x ")[1]}</span>
          )}
          {badge && <span className={"badge-int "+badge.cls}>{badge.label}</span>}
        </div>
      </div>

      {/* Detalle + descanso */}
      {ejercicio.detalle && <div className="ex2-detail">{ejercicio.detalle}</div>}
      {ejercicio.descanso && ejercicio.descanso!=="-" && (
        <div className="ex2-descanso">Descanso: {ejercicio.descanso}</div>
      )}

      {/* Video input */}
      <div className="ex2-video-row">
        <input
          className="ex2-video-input"
          type="text"
          placeholder="Pegar link del video aqui..."
          value={data.video||""}
          onChange={e=>upd({video:e.target.value})}
          readOnly={readOnly}
        />
        {hasVideo && (
          <button className="ex2-video-go" onClick={()=>window.open(data.video,"_blank")}>▶</button>
        )}
      </div>

      {/* Tabla de series */}
      <div className="ex2-series-block">
        <div className="ex2-series-label">TU REGISTRO</div>
        <div className="ex2-series-table">
          <div className="ex2-series-thead">
            <span className="ex2-th-serie">Serie</span>
            <span className="ex2-th-kg">Kg</span>
            <span className="ex2-th-reps">Reps logradas</span>
          </div>
          {Array.from({length: numSeries}, (_,i)=>{
            const s = getSerie(i);
            return (
              <div key={i} className="ex2-series-row">
                <span className="ex2-td-serie">#{i+1}</span>
                <div className="ex2-td-kg">
                  <input
                    type="text" inputMode="decimal"
                    placeholder="—"
                    value={s.kg||""}
                    onChange={e=>updSerie(i,"kg",e.target.value)}
                    readOnly={readOnly}
                    className="ex2-input"
                  />
                </div>
                <div className="ex2-td-reps">
                  <input
                    type="text"
                    placeholder="—"
                    value={s.reps||""}
                    onChange={e=>updSerie(i,"reps",e.target.value)}
                    readOnly={readOnly}
                    className="ex2-input"
                  />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Comentarios */}
      <div className="ex2-comentario">
        <textarea
          placeholder="Comentarios (sensacion, dolor, energia, tecnica...)"
          value={data.comentario||""}
          onChange={e=>upd({comentario:e.target.value})}
          readOnly={readOnly}
          className="ex2-textarea"
        />
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CR STEP — paso individual dentro del bloque CR
   ══════════════════════════════════════════════════ */
function CRStep({ stepNum, ejercicio, k, tracking, onChange, readOnly }){
  const data = tracking[k] || {kg:"",reps:"",comentario:"",video:"",done:false};
  const [showTracking, setShowTracking] = useState(false);
  const upd = (field,val)=>{ if(readOnly) return; onChange(k,{...data,[field]:val}); };
  const hasVideo = data.video&&data.video.trim().length>0;
  const hasAnyData = data.kg||data.reps||data.comentario||data.done;

  return (
    <div className="cr-row">
      <div className="cr-row-main">
        <div className="cr-step-num">{stepNum}</div>
        <div className="cr-step-body">
          <div className="cr-step-name">{ejercicio.nombre}</div>
          {ejercicio.detalle && <div className="cr-step-detail">{ejercicio.detalle}</div>}
          <div className="cr-step-meta">
            <span className="cr-meta-qty">{ejercicio.series}</span>
            <span className={intensityClass(ejercicio.intensidad)}>{ejercicio.intensidad}</span>
            {ejercicio.descanso && ejercicio.descanso!=="-" && (
              <span className="cr-meta-pause">{ejercicio.descanso}</span>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginTop:"7px"}}>
            <button
              style={{background:"none",border:"1px solid var(--line)",
                color:hasAnyData?"var(--lime)":"var(--text-faint)",
                borderRadius:"5px",padding:"3px 9px",fontSize:"10px",
                fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.03em"}}
              onClick={()=>setShowTracking(s=>!s)}
            >
              {showTracking?"Ocultar":(hasAnyData?"Ver registro":"+ Registrar")}
            </button>
            <button
              style={{background:"none",border:"1px solid var(--line)",
                color:hasVideo?"var(--blue)":"var(--text-faint)",
                borderRadius:"5px",padding:"3px 9px",fontSize:"10px",
                fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.03em"}}
              onClick={()=>setShowTracking(true)}
            >
              {hasVideo?"▶ Video":"+ Video"}
            </button>
          </div>
        </div>
      </div>
      {showTracking && (
        <div className="cr-tracking">
          <div className="cr-video-row">
            <input className="cr-video-input" type="text" placeholder="Link del video (YouTube, Instagram...)"
              value={data.video} onChange={e=>upd("video",e.target.value)} readOnly={readOnly}/>
            {hasVideo && <button className="cr-video-btn" onClick={()=>window.open(data.video,"_blank")}>Abrir</button>}
          </div>
          <div className="cr-track-row">
            <div className="cr-track-field">
              <label>Peso / carga</label>
              <input type="text" inputMode="decimal" placeholder="ej. 80kg / 1:45min"
                value={data.kg} onChange={e=>upd("kg",e.target.value)} readOnly={readOnly}/>
            </div>
            <div className="cr-track-field">
              <label>Resultado</label>
              <input type="text" placeholder="ej. completado"
                value={data.reps} onChange={e=>upd("reps",e.target.value)} readOnly={readOnly}/>
            </div>
          </div>
          <div className="cr-track-field" style={{marginBottom:"6px"}}>
            <label>Comentarios</label>
            <textarea placeholder="Sensaciones, tecnica, fatiga..."
              value={data.comentario} onChange={e=>upd("comentario",e.target.value)} readOnly={readOnly}/>
          </div>
          <label className="cr-check">
            <input type="checkbox" checked={!!data.done}
              onChange={e=>upd("done",e.target.checked)} disabled={readOnly}/>
            <span>{readOnly?(hasAnyData?"Registrado":"Sin registrar"):"Marcar como completado"}</span>
          </label>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   COMPROMISED RUNNING BLOCK
   ══════════════════════════════════════════════════ */
function CompromisedRunningBlock({ fase, faseIdx, semana, diaIdx, tracking, onChange, readOnly }){
  const rondas = parseRondas(fase.ejercicios);
  const n = fase.ejercicios.length;
  const titulo = crBlockTitle(fase.fase);
  const hintText = `Circuito intercalado: haces 1 ronda completa (los ${n} pasos en orden) y recien ahi repetis la ronda. NO termines todas las series de un ejercicio antes de pasar al siguiente.`;

  return (
    <div className="cr-block">
      <div className="cr-header">
        <div className="cr-header-left">
          <div className="cr-letter">C</div>
          <div className="cr-title">{titulo}</div>
          {rondas && <span className="cr-rounds-badge">{rondas}</span>}
        </div>
        <span className="cr-time">{estimateCRTime(n)}</span>
      </div>
      <div className="cr-hint">
        <span className="cr-hint-icon">↻</span>
        <span>{hintText}</span>
      </div>
      <table className="cr-table" style={{width:"100%"}}>
        <thead className="cr-table-head">
          <tr><th style={{paddingLeft:"32px",width:"100%"}}>Paso de la ronda</th></tr>
        </thead>
        <tbody>
          {fase.ejercicios.map((ej,exIdx)=>(
            <CRStep key={exIdx} stepNum={exIdx+1} ejercicio={ej}
              k={exKey(semana,diaIdx,faseIdx,exIdx)}
              tracking={tracking} onChange={onChange} readOnly={readOnly}/>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SESSION VIEW
   ══════════════════════════════════════════════════ */
function SessionView({ semana, diaIdx, sesion, tracking, onChange, onToggleDayDone, readOnly }){
  const dk = dayKey(semana,diaIdx);
  const dayDone = !!tracking[dk];
  return (
    <div className="session">
      <div className="session-head">
        <h2>{sesion.titulo}</h2>
        {sesion.notas && <div className="session-notes" dangerouslySetInnerHTML={{__html:"<b>Nota del coach:</b> "+sesion.notas}}/>}
      </div>
      {sesion.fases.map((fase,faseIdx)=>{
        if(isRealCR(fase)){
          return (
            <CompromisedRunningBlock key={faseIdx}
              fase={fase} faseIdx={faseIdx}
              semana={semana} diaIdx={diaIdx}
              tracking={tracking} onChange={onChange} readOnly={readOnly}/>
          );
        }
        return (
          <div className="phase" key={faseIdx}>
            <div className="phase-head"><div className="phase-bar"></div><h3>{fase.fase}</h3></div>
            {fase.ejercicios.map((ej,exIdx)=>(
              <ExerciseCard key={exIdx} semana={semana} diaIdx={diaIdx}
                faseIdx={faseIdx} exIdx={exIdx}
                ejercicio={ej} tracking={tracking} onChange={onChange} readOnly={readOnly}/>
            ))}
          </div>
        );
      })}
      {readOnly ? (
        <div className={"complete-day-btn"+(dayDone?" done":"")}
          style={{display:"flex",alignItems:"center",justifyContent:"center",cursor:"default"}}>
          {dayDone?"✓ El alumno completo esta sesion":"El alumno aun no completo esta sesion"}
        </div>
      ) : (
        <button className={"complete-day-btn"+(dayDone?" done":"")} onClick={()=>onToggleDayDone(dk)}>
          {dayDone?"✓ Sesion marcada como completada":"Marcar sesion como completada"}
        </button>
      )}
    </div>
  );
}

/* ── PROGRESS TRACK ── */
function WeekProgressTrack({ tracking, currentWeek }){
  const completedWeeks=programa.filter(w=>w.sesiones.every((_,di)=>tracking[dayKey(w.semana,di)])).length;
  return (
    <div className="track-wrap">
      <div className="track-label-row">
        <span className="track-label">Progreso del plan</span>
        <span className="track-label"><b>{completedWeeks}</b> / {programa.length} semanas</span>
      </div>
      <div className="track-lanes">
        {programa.map(w=>{
          const done=w.sesiones.every((_,di)=>tracking[dayKey(w.semana,di)]);
          const cur=w.semana===currentWeek;
          return <div key={w.semana} className={"lane"+(done?" done":cur?" current":"")}></div>;
        })}
      </div>
    </div>
  );
}

/* ── GUIDE SECTION ── */
function GuideSection(){
  return (
    <div className="info-section">
      <div className="info-card">
        <h3>Estructura de macrociclos</h3>
        <p><b>Bloque 1 (semanas 1-6) — Base aerobica + hipertrofia:</b> prioridad a construir musculo y base cardiovascular Z2. Series 8-12 reps, descansos largos (90s-2:30min).</p>
        <p><b>Bloque 2 (semanas 7-12) — Build / Concurrente:</b> aparece el compromised running real. La fuerza pasa a mantenimiento con densidad creciente: mismo peso, menos descanso.</p>
        <p><b>Bloque 3 (semanas 13-16) — Peak / Specific prep:</b> simulaciones completas de carrera Hyrox. Volumen de fuerza baja a mantenimiento puro.</p>
        <p><b>Semana 17 — Taper:</b> descarga total, llegar fresco al evento del 24 de octubre.</p>
      </div>
      <div className="info-card">
        <h3>Como leer los bloques de Compromised Running</h3>
        <p>Los bloques marcados con <b>C</b> son circuitos intercalados: haces el paso 1, luego inmediatamente el paso 2 (y asi hasta el ultimo), y eso es 1 ronda completa. Recien despues descansos y volvias a empezar. NO termines todas las series de un ejercicio antes de pasar al siguiente.</p>
      </div>
      <div className="info-card">
        <h3>Principio de sobrecarga progresiva</h3>
        <ul>
          <li><b>Fuerza:</b> si completas todas las series con RPE menor al indicado, sube 2.5-5% la semana siguiente.</li>
          <li><b>Carrera:</b> el volumen sube antes que la velocidad.</li>
          <li><b>Densidad (bloque 2):</b> reducir descanso 10-15% antes que subir peso.</li>
        </ul>
      </div>
      <div className="info-card">
        <h3>Por que no vas a perder musculo</h3>
        <p>Los dias de fuerza (1, 3 y 5) mantienen series de 8-12 reps con descansos largos en todo el plan. Nunca cae fuerza pesada de piernas el dia antes/despues de la sesion de carrera de calidad.</p>
        <p><b>Nutricion:</b> apunta a 1.8-2.2 g/kg de proteina diaria repartida en 4 comidas, superavit calorico leve (200-300 kcal) en dias de fuerza.</p>
      </div>
      <div className="info-card">
        <h3>Exportar e importar progreso</h3>
        <p><b>Alumno:</b> usa "Exportar progreso" para descargar tu .json y mandarlo a tu coach cuando te lo pida.</p>
        <p><b>Coach:</b> usa "Importar" para cargar el .json del alumno y ver su progreso en modo solo lectura.</p>
      </div>
      <div className="info-card">
        <h3>Evento octubre 24, 2026</h3>
        <p>Cae en la semana 17 (taper). Usalo para validar pace bajo fatiga real y tecnica en estaciones. Los datos de ese dia son el insumo mas valioso para el Hyrox oficial en 2027.</p>
      </div>
    </div>
  );
}

/* ── STATS SECTION ── */
function StatsSection({ tracking }){
  const totalSes=programa.reduce((a,w)=>a+w.sesiones.length,0);
  const doneSes=programa.reduce((a,w)=>a+w.sesiones.filter((_,di)=>tracking[dayKey(w.semana,di)]).length,0);
  let totalKg=0,countKg=0;
  Object.keys(tracking).forEach(k=>{
    const v=tracking[k];
    if(k.includes("_e") && v){
      if(v.series){ v.series.forEach(s=>{ const n=parseFloat(s.kg); if(!isNaN(n)){totalKg+=n;countKg++;} }); }
      else if(v.kg){ const n=parseFloat(v.kg); if(!isNaN(n)){totalKg+=n;countKg++;} }
    }
  });
  return (
    <div className="stat-grid">
      <div className="stat-card"><div className="s-label">Sesiones completadas</div><div className="s-val">{doneSes}/{totalSes}</div></div>
      <div className="stat-card"><div className="s-label">% del plan avanzado</div><div className="s-val">{Math.round((doneSes/totalSes)*100)}%</div></div>
      <div className="stat-card"><div className="s-label">Carga prom. registrada</div><div className="s-val">{countKg>0?Math.round(totalKg/countKg):0} kg</div></div>
      <div className="stat-card"><div className="s-label">Dias hasta el evento</div><div className="s-val" id="days-to-event">--</div></div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [tracking,setTracking]=useState(()=>loadTracking());
  const [currentWeek,setCurrentWeek]=useState(1);
  const [currentDay,setCurrentDay]=useState(0);
  const [mainTab,setMainTab]=useState("plan");
  const [importedData,setImportedData]=useState(null);
  const [importError,setImportError]=useState("");
  const fileInputRef=useRef(null);

  useEffect(()=>{ if(!importedData) saveTracking(tracking); },[tracking,importedData]);
  useEffect(()=>{
    const el=document.getElementById("days-to-event");
    if(el){ const d=Math.ceil((new Date("2026-10-24")-new Date())/864e5); el.textContent=d>0?d:"Hoy"; }
  },[mainTab]);

  const weekData=useMemo(()=>programa.find(w=>w.semana===currentWeek),[currentWeek]);
  const activeTracking=importedData?importedData.tracking:tracking;
  const isReadOnly=!!importedData;

  const handleChange=useCallback((key,val)=>{ if(!isReadOnly) setTracking(p=>({...p,[key]:val})); },[isReadOnly]);
  const handleToggleDay=useCallback((dk)=>{ if(!isReadOnly) setTracking(p=>({...p,[dk]:!p[dk]})); },[isReadOnly]);

  const handleExport=()=>{
    const fecha=new Date().toISOString().slice(0,10);
    downloadJSON(`progreso_Bryan_Araujo_${fecha}.json`,{
      tipo:"hyrox17_export",version:1,alumno:"Bryan Araujo",
      exportadoEl:new Date().toISOString(),tracking
    });
  };

  const handleImportClick=()=>{ setImportError(""); fileInputRef.current&&fileInputRef.current.click(); };

  const handleFileSelected=e=>{
    const file=e.target.files&&e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed||parsed.tipo!=="hyrox17_export"||typeof parsed.tracking!=="object"){
          setImportError("Archivo invalido. Usa el boton 'Exportar progreso' dentro de la app."); return;
        }
        setImportedData(parsed); setImportError(""); setCurrentWeek(1); setCurrentDay(0);
      }catch(err){ setImportError("No se pudo leer el archivo. Verifica que sea el .json exportado desde la app."); }
    };
    reader.readAsText(file); e.target.value="";
  };

  const handleReset=()=>{
    if(window.confirm("Esto borra TODO tu historial. Esta accion no se puede deshacer. Continuar?")){
      localStorage.removeItem(STORAGE_KEY); setTracking({});
    }
  };

  return (
    <div className="app">
      <input type="file" accept="application/json" ref={fileInputRef} style={{display:"none"}} onChange={handleFileSelected}/>
      <div className="topbar">
        <div className="brand-row">
          <div className="brand"><h1>PLAN PERSONALIZADO - <span className="accent">BRYAN ARAUJO</span></h1></div>
        </div>
        <div className="brand-sub" style={{marginBottom:"10px"}}>Plan de preparacion · Jun 2026 → Oct 2026</div>
        <div className="header-actions">
          <button className="hdr-btn export" onClick={handleExport}><span className="arrow">↓</span> Exportar progreso</button>
          <button className="hdr-btn" onClick={handleImportClick}><span className="arrow">↑</span> Importar</button>
          <button className="hdr-btn" onClick={handleReset}>Reiniciar datos</button>
        </div>
        <WeekProgressTrack tracking={activeTracking} currentWeek={currentWeek}/>
      </div>

      {importError&&<div className="import-error">{importError}</div>}
      {importedData&&(
        <React.Fragment>
          <div className="coach-banner">
            <div className="c-text">
              <b>Viendo progreso de {importedData.alumno}</b>
              Exportado el {new Date(importedData.exportadoEl).toLocaleDateString("es-AR")}
            </div>
            <button className="coach-close-btn" onClick={()=>{setImportedData(null);setImportError("");}}>Cerrar</button>
          </div>
          <div className="readonly-note">Modo solo lectura — no se pueden editar los datos del alumno desde aca.</div>
        </React.Fragment>
      )}

      <div className="main-tabs" style={{marginTop:"8px"}}>
        <button className={"main-tab"+(mainTab==="plan"?" active":"")} onClick={()=>setMainTab("plan")}>Plan</button>
        <button className={"main-tab"+(mainTab==="stats"?" active":"")} onClick={()=>setMainTab("stats")}>Stats</button>
        <button className={"main-tab"+(mainTab==="guia"?" active":"")} onClick={()=>setMainTab("guia")}>Guia</button>
      </div>

      {mainTab==="plan"&&weekData&&(
        <React.Fragment>
          <div className="week-scroller" style={{padding:"0 16px 12px 16px"}}>
            {programa.map(w=>{
              const done=w.sesiones.every((_,di)=>activeTracking[dayKey(w.semana,di)]);
              return (
                <button key={w.semana}
                  className={"week-pill"+(w.semana===currentWeek?" active":"")+(done?" complete":"")}
                  onClick={()=>{setCurrentWeek(w.semana);setCurrentDay(0);}}>
                  S{w.semana}
                </button>
              );
            })}
          </div>
          <div className="block-banner">
            <div className="b-title">{weekData.bloque}</div>
            <div className="b-sub">{weekData.fase_bloque}</div>
          </div>
          <div className="day-nav">
            {weekData.sesiones.map((s,di)=>{
              const done=!!activeTracking[dayKey(weekData.semana,di)];
              return (
                <button key={di} className={"day-tab"+(di===currentDay?" active":"")} onClick={()=>setCurrentDay(di)}>
                  <span className={"dot"+(done?" done":"")}></span>
                  {s.dia}
                </button>
              );
            })}
          </div>
          <div style={{padding:"0 16px 8px 16px",display:"flex",justifyContent:"flex-end"}}>
            <span className={typeClass(weekData.sesiones[currentDay].tipo)+" type-badge"}>
              {weekData.sesiones[currentDay].tipo}
            </span>
          </div>
          <SessionView
            semana={weekData.semana} diaIdx={currentDay}
            sesion={weekData.sesiones[currentDay]}
            tracking={activeTracking} onChange={handleChange}
            onToggleDayDone={handleToggleDay} readOnly={isReadOnly}
          />
        </React.Fragment>
      )}

      {mainTab==="stats"&&<div style={{padding:"4px 0"}}><StatsSection tracking={activeTracking}/></div>}
      {mainTab==="guia"&&<GuideSection/>}

      <div className="footer-note">
        PLAN PERSONALIZADO - BRYAN ARAUJO · Programa generado para preparacion personal<br/>
        Tus datos se guardan unicamente en este dispositivo
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
